<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxLang + Alpine.js Todo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load WASM + Alpine ESM in parallel, then register and start -->
    <script type="module">
        import { ready, registerComponent } from './app.js';

        const [_, { default: Alpine }] = await Promise.all([
            ready,
            import('https://unpkg.com/alpinejs@3/dist/module.esm.js')
        ]);
        window.Alpine = Alpine;

        await registerComponent();
        Alpine.start();
    </script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700"
         x-data="bxTodoApp">
        
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-extrabold text-blue-400 tracking-tight">
                BoxLang <span class="text-white">Todo</span>
            </h1>
            <p class="text-slate-400 mt-2">Zero-boilerplate logic running in a WASM VM</p>
        </header>

        <!-- New Todo Input -->
        <div class="relative group mb-8">
            <input 
                type="text" 
                x-model="newTodo"
                @keyup.enter="addTodo($data)"
                placeholder="What needs to be done?"
                class="w-full bg-slate-950 border border-slate-600 rounded-xl px-6 py-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder:text-slate-600"
            >
            <button 
                @click="addTodo($data)"
                class="absolute right-3 top-3 px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold transition-all shadow-lg active:scale-95"
            >
                Add
            </button>
        </div>

        <!-- Filters & Stats -->
        <div class="flex items-center justify-between mb-6 text-sm">
            <div class="flex bg-slate-950 p-1 rounded-lg border border-slate-700">
                <button 
                    @click="filter = 'all'"
                    :class="filter === 'all' ? 'bg-slate-700 text-white shadow-sm' : 'text-slate-400 hover:text-slate-200'"
                    class="px-4 py-1.5 rounded-md transition-all font-medium"
                >All</button>
                <button 
                    @click="filter = 'open'"
                    :class="filter === 'open' ? 'bg-slate-700 text-white shadow-sm' : 'text-slate-400 hover:text-slate-200'"
                    class="px-4 py-1.5 rounded-md transition-all font-medium"
                >Open</button>
                <button 
                    @click="filter = 'done'"
                    :class="filter === 'done' ? 'bg-slate-700 text-white shadow-sm' : 'text-slate-400 hover:text-slate-200'"
                    class="px-4 py-1.5 rounded-md transition-all font-medium"
                >Done</button>
            </div>
            
            <button 
                x-show="completed > 0"
                @click="clearCompleted($data)"
                class="text-red-400 hover:text-red-300 transition-colors font-medium flex items-center gap-2"
            >
                Clear Completed
            </button>
        </div>

        <!-- Todo List -->
        <div class="space-y-3 min-h-[200px]">
            <template x-for="todo in filteredTodos($data)" :key="todo.id">
                <div 
                    class="flex items-center gap-4 p-4 rounded-xl border border-slate-700 transition-all group"
                    :class="todo.done ? 'opacity-60 bg-slate-800/50' : 'bg-slate-750 hover:border-slate-600'"
                >
                    <div class="relative flex items-center">
                        <input 
                            type="checkbox" 
                            :checked="todo.done"
                            @change="toggleTodo(todo.id, $data)"
                            class="w-6 h-6 rounded-full border-2 border-slate-600 appearance-none checked:bg-blue-500 checked:border-blue-500 transition-all cursor-pointer"
                        >
                        <div x-show="todo.done" class="absolute inset-0 flex items-center justify-center pointer-events-none text-white">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                    </div>

                    <span 
                        class="flex-1 text-lg transition-all"
                        :class="todo.done ? 'line-through text-slate-500' : 'text-slate-200'"
                        x-text="todo.text"
                    ></span>

                    <button 
                        @click="removeTodo(todo.id, $data)"
                        class="p-2 text-slate-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all"
                    >
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
            </template>

            <template x-if="total === 0">
                <div class="flex flex-col items-center justify-center py-12 text-slate-500">
                    <svg class="w-16 h-16 mb-4 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                    </svg>
                    <p class="text-xl font-medium text-slate-400">No tasks yet</p>
                    <p class="text-sm">Enjoy your free time!</p>
                </div>
            </template>
        </div>

        <!-- Footer Stats -->
        <footer class="mt-8 pt-6 border-t border-slate-700 flex justify-between text-xs text-slate-500 uppercase tracking-widest font-bold">
            <span x-text="`${remaining} remaining`" :class="remaining > 0 ? 'text-blue-400' : ''"></span>
            <span x-text="`${completed} completed`" :class="completed > 0 ? 'text-green-400' : ''"></span>
            <span x-text="`${total} total`" class="text-slate-400"></span>
        </footer>

        <p class="mt-8 text-[10px] text-slate-600 text-center italic uppercase tracking-widest">
            MatchBox WASM VM · BoxLang logic · Alpine.js UI
        </p>
    </div>

</body>
</html>
